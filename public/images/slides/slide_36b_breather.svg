  <g transform="translate(200,150)">
    <rect x="0" y="0" width="120" height="20" fill="#C0C0C0" opacity="0.6"/>
    <rect x="0" y="30" width="100" height="20" fill="#C0C0C0" opacity="0.5"/>
    <rect x="0" y="60" width="140" height="20" fill="#C0C0C0" opacity="0.4"/>
  </g>
  <!-- Arrow -->
  <g transform="translate(420,180)" fill="#2DD4BF">
    <rect x="0" y="10" width="120" height="20"/>
    <rect x="100" y="0" width="20" height="40"/>
    <rect x="120" y="10" width="20" height="20"/>
  </g>
  <!-- Data blocks -->
  <g transform="translate(580,140)">
    <rect x="0" y="0" width="40" height="40" fill="#FF6B6B" opacity="0.7"/>
    <rect x="50" y="0" width="40" height="40" fill="#6C5CE7" opacity="0.7"/>
    <rect x="100" y="0" width="40" height="40" fill="#2DD4BF" opacity="0.7"/>
    <rect x="0" y="50" width="40" height="40" fill="#2DD4BF" opacity="0.7"/>
    <rect x="50" y="50" width="40" height="40" fill="#FF6B6B" opacity="0.7"/>
    <rect x="100" y="50" width="40" height="40" fill="#6C5CE7" opacity="0.7"/>
  </g>
  <text x="480" y="500" text-anchor="middle" fill="#666" font-family="monospace" font-size="14">slide_36b_breather — replace with pixel art</text>
</svg>
