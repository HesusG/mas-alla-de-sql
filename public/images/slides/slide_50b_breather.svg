<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#2DD4BF" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="960" height="540" fill="#1a1a2e"/>
  <rect width="960" height="540" fill="url(#grid)"/>
  <!-- Robot body -->
  <g transform="translate(380,100)" fill="#C0C0C0">
    <rect x="20" y="0" width="120" height="20"/>
    <rect x="0" y="20" width="160" height="100"/>
    <!-- Eyes -->
    <rect x="30" y="40" width="30" height="30" fill="#2DD4BF"/>
    <rect x="100" y="40" width="30" height="30" fill="#2DD4BF"/>
    <!-- Mouth -->
    <rect x="40" y="90" width="80" height="10" fill="#282A36"/>
  </g>
  <!-- Book -->
  <g transform="translate(340,260)" fill="#FF6B6B" opacity="0.7">
    <rect x="0" y="0" width="100" height="120" rx="2"/>
    <rect x="110" y="0" width="100" height="120" rx="2"/>
    <rect x="95" y="0" width="20" height="120" fill="#282A36" opacity="0.3"/>
  </g>
  <!-- Lightbulb -->
  <g transform="translate(560,120)" fill="#FFE156">
    <rect x="20" y="0" width="40" height="20"/>
    <rect x="10" y="20" width="60" height="40"/>
    <rect x="20" y="60" width="40" height="20"/>
    <rect x="25" y="80" width="30" height="10"/>
  </g>
  <text x="480" y="500" text-anchor="middle" fill="#666" font-family="monospace" font-size="14">slide_50b_breather — replace with pixel art</text>
</svg>
